services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbi-backend
    ports:
      - "8000:8000"
    volumes:
      # 开发模式挂载代码，生产环境请移除
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # 如果数据库在宿主机，使用 host.docker.internal
      - DB_HOST=host.docker.internal
    extra_hosts:
      # 允许容器访问宿主机网络
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - chatbi-network

networks:
  chatbi-network:
    driver: bridge