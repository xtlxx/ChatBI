name: Visual Validation

on:
  pull_request:
    paths:
      - 'frontend/src/components/**'
      - 'frontend/src/styles/**'
      - 'frontend/src/*.css'

jobs:
  visual-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Visual Validation Script
        run: node scripts/visual-check.js

      - name: Run Lighthouse CI (Mock)
        run: |
          echo "Running Lighthouse CI..."
          # This would be: lhci autorun
          echo "Lighthouse Score: 95/100 (Best Practices)"

      - name: Run Axe Accessibility Check (Mock)
        run: |
          echo "Running Axe Core..."
          # This would be: axe-core check
          echo "Accessibility Violations: 0"

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Visual Validation Failed! Please check the report.'
            })
